<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="h a v e n">
    <meta name="mobile-web-app-capable" content="yes">
    <title>h a v e n</title>
    <link rel="icon" type="image/jpeg" href="assets/favicon/favicon">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <!-- RPG UI (HUD) -->
        <div id="rpg-hud" style="display:none;">
            <div class="hud-top-row">
                <div id="profile-btn">
                    <div id="profile-pic"></div>
                </div>
                <div class="hud-top">
                    <div class="stat-row">
                        <span class="stat-label">Level <span id="val-level">1</span></span>
                        <div class="stat-bar-bg"><div id="bar-xp" class="stat-bar-fill"></div></div>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Exhaustion</span>
                        <div class="stat-bar-bg"><div id="bar-hp" class="stat-bar-fill" style="background: #ff4488;"></div></div>
                    </div>
                </div>
            </div>
            
            <div>
                <div id="gold-display">GOLD: <span id="val-gold">0</span> | SPINS: <span id="val-spins">0</span></div>
                <div style="text-align:right;">
                    <button id="btn-debug-reset" style="display:none; background:rgba(255, 68, 136, 0.2); border:1px solid #ff4488; color:#ff4488; padding:8px 16px; border-radius:8px; font-size:10px; letter-spacing:2px; cursor:pointer; pointer-events:auto; margin-top:10px; margin-right:5px;">DEBUG: RESET TODAY</button>
                    <button id="btn-logout">LOGOUT</button>
                </div>
            </div>
        </div>

        <!-- Profile & Check-in Modal -->
        <div id="checkin-overlay" class="modal-overlay" style="display:none;">
            <div class="modal-content profile-modal">
                <h2 id="profile-title">Player Profile</h2>
                <div id="profile-narrative" style="margin-bottom:20px; font-size:14px; line-height:1.5; color:#bbccdd; text-align:left; background:rgba(0,0,0,0.3); padding:15px; border-radius:10px;">
                    Loading profile data...
                </div>
                <h3 style="color:#00ccff; font-weight:300; font-size:14px; letter-spacing:2px; margin-bottom:15px;">Daily Attendance</h3>
                <div id="calendar-grid"></div>
                <button id="btn-checkin" disabled>CHECK IN</button>
                <button id="btn-close-checkin">CLOSE</button>
            </div>
        </div>

        <!-- Centered UI Overlay -->
        <div id="ui-layout">
            <div id="splash-screen">
                <div class="version-tag">v0.9.0</div>
                <h1 id="game-title">h a v e n</h1>
                <p id="game-status">Connecting to Bridge...</p>
                
                <div id="auth-box">
                    <div id="auth-forms">
                        <!-- Signup Form -->
                        <div id="form-signup" class="auth-form" style="display:none;">
                            <input type="text" id="reg-name" placeholder="Name" maxlength="20">
                            <input type="password" id="reg-pin" placeholder="4-Digit PIN" maxlength="4">
                            <select id="reg-gender">
                                <option value="" disabled selected>Select Gender</option>
                                <option value="male">Male</option>
                                <option value="female">Female</option>
                            </select>
                            <button id="btn-signup">Create Account</button>
                            <p class="toggle-auth">Have an account? <span id="link-to-login">Log In</span></p>
                        </div>

                        <!-- Login Form -->
                        <div id="form-login" class="auth-form">
                            <input type="text" id="login-name" placeholder="Name" maxlength="20">
                            <input type="password" id="login-pin" placeholder="4-Digit PIN" maxlength="4">
                            <button id="btn-login">Log In</button>
                            <p class="toggle-auth">No account? <span id="link-to-signup">Create One</span></p>
                        </div>
                    </div>
                    
                    <div id="auth-opts">
                        <label><input type="checkbox" id="check-remember"> Remember account</label>
                    </div>
                </div>
            </div>
        </div>

        <!-- Mobile Controls -->
        <div id="mobile-controls" style="display:none;">
            <button id="btn-left" class="ctrl-btn">◀</button>
            <button id="btn-right" class="ctrl-btn">▶</button>
        </div>

        <!-- Chat & Version Overlay -->
        <div id="bottom-ui" style="display:none;">
            <div id="chat-box">
                <input type="text" id="chat-input" placeholder="Type here..." maxlength="50">
            </div>
            <div id="version-display">v0.9.0</div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
